# Cloudflare Workers + static assets (same folder as your HTML/CSS/JS).
# After connecting this repo, add in the dashboard (or via wrangler):
#   - KV namespace binding: variable name SITE_DATA
#   - Secret: SAVE_TOKEN (long random string; share with staff who update photos)
#
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "lilbloomerschildcarecenter"
main = "worker.js"
compatibility_date = "2025-04-10"

[assets]
directory = "."
binding = "ASSETS"

# IMPORTANT: Git runs `wrangler deploy`. Bindings you add only in the Cloudflare UI
# are often REMOVED on the next deploy unless they also exist here.
#
# 1. Workers & Pages → KV → your namespace → copy the Namespace ID (UUID).
# 2. Uncomment the block below and paste the id. Push to Git → bindings stay.
#
# [[kv_namespaces]]
# binding = "SITE_DATA"
# id = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
