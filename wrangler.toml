# Cloudflare Workers + static assets (same folder as your HTML/CSS/JS).
# KV is declared below so Git deploys keep the binding. Binding name must match worker.js (KV).
#
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "lilbloomerschildcarecenter"
main = "worker.js"
# Required for CI (GitHub Actions) when no global Wrangler config exists
account_id = "68ed007a9dd655f70b2ca9fe642f5a02"
compatibility_date = "2025-04-10"

[assets]
directory = "."
binding = "ASSETS"

[[kv_namespaces]]
binding = "KV"
id = "bfac3cd93ad647d5b05219f6d1eb4f48"
