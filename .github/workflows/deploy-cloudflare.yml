# Deploy Worker + static assets on push to main (manual re-run: Actions → Run workflow).
#
# GitHub → Settings → Secrets and variables → Actions:
#   CLOUDFLARE_API_TOKEN — required. Create at https://dash.cloudflare.com/profile/api-tokens
#   (template "Edit Cloudflare Workers", or Workers Scripts:Edit + Workers KV Storage:Edit).

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Verify API token
        run: wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker and assets
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
