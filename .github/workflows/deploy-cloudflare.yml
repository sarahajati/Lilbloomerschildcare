# Pushes to main run `wrangler deploy` so the live site updates.
#
# GitHub → Settings → Secrets and variables → Actions:
#   CLOUDFLARE_API_TOKEN — required (see https://developers.cloudflare.com/fundamentals/api/get-started/create-token/)
#   Use template "Edit Cloudflare Workers" or include: Workers Scripts:Edit, Workers KV Storage:Edit,
#   Account Settings:Read (exact names may vary slightly in the dashboard).
#
# If deploy still fails, open the failed job log and search for ERROR.

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Publish Worker + assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
