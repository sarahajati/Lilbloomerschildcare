# Deploy Worker + static assets on push to main (Actions → Run workflow to retry).
#
# REQUIRED — Repository secret (Settings → Secrets and variables → Actions → Secrets):
#   Name (exact): CLOUDFLARE_API_TOKEN
#   Value: Cloudflare API token — https://dash.cloudflare.com/profile/api-tokens
#
# Create token → “Create Custom Token” → Permissions:
#   Account → Workers Scripts → Edit
#   Account → Workers KV Storage → Edit
#   Account → Workers Tail → Read (optional)
#   User → User Details → Read (helps whoami)
# Under “Account Resources”, include the account that owns this Worker + KV namespace.
#
# After saving the secret, open Actions → latest run → “Re-run all jobs”.
# Do not put the token in “Variables”; use “Secrets”. No spaces before/after when pasting.
#
# Node on Actions: checkout@v6 / setup-node@v6 run on node24. Workflow-level FORCE_* opts the
# runner in early. If GitHub still shows a Node 20 “annotation”, it may be a known false
# positive (github.com/actions/runner/issues/4295) or an old run — open the latest job log.

name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check Cloudflare token secret
        shell: bash
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set for this workflow."
            echo "Add a Repository secret with that exact name: Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "OK: secret CLOUDFLARE_API_TOKEN is non-empty."

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"

      - name: Verify token with Cloudflare (whoami)
        run: npx --yes wrangler@4 whoami

      - name: Deploy Worker and assets
        env:
          WRANGLER_LOG: info
        run: npx --yes wrangler@4 deploy
